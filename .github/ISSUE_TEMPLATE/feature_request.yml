name: 功能需求
description: 提出新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        描述需求背景与验收标准，便于拆分为 PR。
  - type: textarea
    id: problem
    attributes:
      label: 背景 / 痛点
      description: 要解决什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望的实现方式（可多个选项）
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 怎样算完成？
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      options:
        - 数据采集
        - OpenClaw / LLM 打分
        - Streamlit UI
        - 脚本 / 运维
        - 文档
        - 其他
