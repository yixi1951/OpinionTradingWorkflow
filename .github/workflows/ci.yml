name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run linters and type checks
        run: |
          ruff check src tests openclaw_ws_proxy.py openclaw_stub.py run_pipeline.py
          black --check src tests openclaw_ws_proxy.py openclaw_stub.py run_pipeline.py
          mypy src/opinion_trading || true
      - name: Run tests
        run: |
          pytest --cov=src/opinion_trading --cov-report=term-missing --cov-report=xml -q
